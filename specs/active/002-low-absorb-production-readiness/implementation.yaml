task_id: "002-low-absorb-production-readiness"
title: "Low Absorb 生产化与外部联调 — Batch A：多源行情稳定性"
implemented_by: "Claude Code CLI"
created_at: "2026-06-14"

contract:
  file: "contract.yaml"
  risk_level: "A"
  read: true

understanding:
  goal: >
    将 Low Absorb 从本地示例能力推进为真实数据可接入、异常可降级的状态。
    Batch A 聚焦多源行情稳定性：建立 A 股多源编排（mootdx/腾讯优先）、
    全球与美股行情、数据质量模型、fallback、熔断、冲突检测和 fail-closed，
    并让 scanner/sentiment 消费数据质量状态。
  in_scope:
    - "实现数据源质量模型：DataSourceAttempt、DataConflict、DataSourceHealth、MultiSourceFetchResult"
    - "实现 A 股多源编排层（data_sources/a_share_orchestrator.py），优先 mootdx 和腾讯"
    - "实现多源适配器（data_sources/a_share_adapters.py）：mootdx、腾讯、百度/新浪/巨潮/同花顺、东方财富（限流）"
    - "实现数据源健康检查与熔断（data_sources/health.py）：健康评分、熔断状态、冷却"
    - "实现全球与美股行情 provider 升级（data_sources/global_provider.py）：数据质量返回"
    - "更新 data_provider.py 兼容既有 MarketDataProvider 协议"
    - "更新 fallback_provider.py：生产模式禁用 fixture fallback，返回显式标记"
    - "更新 config.py：数据源优先级、新鲜度阈值、冲突容忍、生产 fallback 开关"
    - "更新 sentiment.py：消费真实数据质量状态，fail-closed 返回'观察'或'拦截'"
    - "更新 scanner.py：数据异常时阻断信号和交易计划生成"
    - "更新 models.py：新增共享数据源质量模型"
    - "更新 api/__init__.py：注册数据源诊断路由"
    - "新增数据源状态 API（data_sources/status, check, attempts）"
    - "新增 Task 1 测试文件"
  out_of_scope:
    - "页面中文化、视觉优化、UI 重构"
    - "前端 frontend/src/** 修改"
    - "成本链半自动采集与人工审核（Batch B）"
    - "日线级真实回测（Batch C）"
    - "飞书真实联调（Batch D）"
    - "本机生产部署配置（Batch E）"
    - "新增 Python 依赖（如 mootdx、yfinance 等已存在则使用，不存在则停止请求确认）"
    - "真实券商下单、自动买卖、自动委托、一键交易"
    - "用 AI 生成行情数据"

