risk_assessment:
  risks:
    - "真实飞书 Webhook 可能因调试或测试失误意外发送通知"
    - "Webhook 可能通过 API 响应、日志或错误消息完整暴露"
    - "通知审计积压可能导致存储膨胀"
    - "storage 增加新字段可能破坏现有 JSON 序列化兼容性"
  mitigations:
    - "默认 LOW_ABSORB_FEISHU_REAL_SEND=false；真实发送必须同时满足 webhook 存在 + real_send 显式开启；接口默认 mock"
    - "_mask_webhook() 在所有 API 和日志路径使用；统一掩码函数"
    - "storage 通知审计上限参考回测策略或简单时间范围保留"
    - "追加新字段，不修改现有方法签名；JsonLowAbsorbStorage 默认兼容"

questions_for_codex:
  - question: "通知审计需要保留多少条？是否参考回测 50 条上限做类似限制？"
    decision: "确认：需要设置上限，但不要沿用回测 50 条。通知审计频率高于回测，Batch D 使用本地轻量上限 500 条，建议在 storage.py 中定义 MAX_NOTIFICATION_AUDITS = 500；超过上限时按 sent_at 或 created_at 淘汰最旧记录，并补充溢出淘汰测试。暂不新增配置项或依赖。"
  - question: "api/settings.py 已包含飞书配置 GET/PATCH，通知状态/测试/审计路由是否直接加在 settings.py 中（路径前缀 /low-absorb/settings/notifications/），还是新建 api/notifications.py（路径前缀 /low-absorb/notifications/）？"
    decision: "确认：本批次直接放在 api/settings.py 中，路径使用 /low-absorb/settings/notifications/status、/low-absorb/settings/notifications/test、/low-absorb/settings/notifications/audit。理由是 Task 4 允许范围已明确包含 api/settings.py，避免新增 api/notifications.py 和 api/__init__.py 注册变更；后续如要统一 /low-absorb/notifications/*，另开契约处理。"

codex_confirmation:
  reviewed_by: "Codex"
  reviewed_at: "2026-06-16"
  decision: "CONFIRMED"
  answers:
    notification_audit_retention: "使用 MAX_NOTIFICATION_AUDITS = 500；超过上限淘汰最旧记录；需覆盖 InMemory 与 Json 持久化/重载测试。"
    notification_routes: "本批次放在 api/settings.py，使用 /low-absorb/settings/notifications/* 路径；不新建 api/notifications.py。"
  required_constraints:
    - "默认 LOW_ABSORB_FEISHU_REAL_SEND=false"
    - "真实发送必须同时满足 webhook 存在 + real_send_enabled=true"
    - "Webhook 不得完整回显到 API、日志、测试快照"
    - "每类通知必须有幂等键和审计记录"
    - "真实联调测试缺少环境变量时必须 skip，不得失败或真实发送"
    - "不得新增依赖，不得修改 frontend/src/**、pyproject.toml、requirements*.txt、uv.lock、package.json、frontend/package.json"
    - "不得接入券商 API、真实下单、自动交易、一键交易或禁用按钮文案"

