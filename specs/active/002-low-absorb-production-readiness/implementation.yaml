risk_assessment:
  risks:
    - "CostChainModel 增加 status 字段可能影响现有序列化"
    - "storage.py 增加候选/审计方法可能影响现有仓储协议"
    - "chain_matrix.py 限制 ACTIVE 版本可能使默认的旧版模型（None status）被视为非 ACTIVE"
  mitigations:
    - "status 字段默认为 None，向后兼容视为 ACTIVE"
    - "新增方法只追加不修改现有仓储协议签名"
    - "chain_matrix 消费时，model 的 status 为 None 也视为 ACTIVE"

questions_for_codex:
  - "Batch B 是否需要支持前端展示候选版本审核状态？（contract.yaml 只要求后端 API）"
  - "cost_chain/updater.py 的采集逻辑是否需要真实 HTTP 依赖，还是只需从默认模型生成候选？"
  - "回滚操作是否需要一个显式的版本号参数指定目标版本，还是只回滚到上一 ACTIVE 版本？"
  - "CostChainModel.status 默认 None 视为 ACTIVE 的兼容方式是否接受？"

codex_confirmation:
  reviewed_by: "Codex"
  reviewed_at: "2026-06-15"
  decision: "CONFIRMED"
  answers:
    - question: "Batch B 是否需要支持前端展示候选版本审核状态？"
      decision: "不需要。Batch B 只实现后端 API、存储、chain_matrix 消费约束和测试；不得修改 frontend/src/**。"
    - question: "cost_chain/updater.py 是否需要真实 HTTP 依赖？"
      decision: "不需要。Batch B 不新增依赖、不接真实 HTTP 采集；先实现可插拔 source 契约，并使用默认/手工/fixture 数据生成 REVIEW_PENDING 候选版本。真实外部采集可在后续单独授权。"
    - question: "回滚操作是否需要显式版本号？"
      decision: "需要。API 以显式目标版本为主，避免“上一 ACTIVE”歧义；如内部 helper 支持上一版本回滚，也必须确定性、可测试、可审计。"
    - question: "CostChainModel.status 默认 None 视为 ACTIVE 是否接受？"
      decision: "接受，仅用于兼容历史内置模型。新建候选版本必须显式 status；REVIEW_PENDING、REJECTED、ROLLED_BACK、低置信度版本不得影响信号排序。"
  required_constraints:
    - "低置信度或未审核候选不得被 chain_matrix 消费，也不得改变信号排序。"
    - "APPROVED 不等于自动影响排序；只有通过审核并成为 ACTIVE 的有效版本才可被消费。"
    - "回滚必须写入审计记录，包含来源版本、目标版本、操作者/任务来源、时间和说明。"
    - "不得新增依赖，不得修改 frontend/src/**、pyproject.toml、requirements*.txt、uv.lock、package.json 或 frontend/package.json。"
    - "不得接入券商 API、真实下单、自动交易、一键交易或禁用按钮文案。"

status:
  ready_to_implement: true
  blocked_reason: null
  codex_confirmation_required: true
  codex_confirmed: true
