risk_assessment:
  risks:
    - "回测引擎依赖历史日线数据，真实依赖不可用时需用 fixture 数据完成测试"
    - "复用 scanner 扫描漏斗可能导致回测影响现有扫描逻辑"
    - "回测结果可能被用户误解为确定性收益"
    - "storage 增加新状态可能破坏现有序列化兼容性"
  mitigations:
    - "dataset 支持 fixture 数据模式和显式标记；生产模式不得 fixture 伪装真实数据"
    - "回测引擎在独立上下文运行，不修改 scanner 内部状态"
    - "回测输出强制包含 limitations 字段和限制说明；系统建议与人工成交假设分离"
    - "storage 追加新方法，不修改现有方法签名；JsonLowAbsorbStorage 序列化兼容旧数据"

questions_for_codex:
  - "回测引擎是否需要支持自定义股票池参数（symbols=None 表示全量主板扫描），还是必须显式传入？"
  - "回测结果持久化是否需要限制最大存储条数以防本机磁盘膨胀？"

codex_confirmation:
  reviewed_by: "Codex"
  reviewed_at: "2026-06-15"
  decision: "CONFIRMED"
  answers:
    - question: "回测引擎是否需要支持自定义股票池参数（symbols=None 表示全量主板扫描），还是必须显式传入？"
      decision: "Batch C 必须支持显式 symbols 股票池。symbols=None 不得隐式承诺全量主板真实扫描；可以在 dev/test fixture 或已有 provider 能返回受控 universe 时使用默认股票池，否则应 fail-closed 并返回缺失股票池/缺失数据说明。"
    - question: "回测结果持久化是否需要限制最大存储条数以防本机磁盘膨胀？"
      decision: "需要。Batch C 应对本机持久化回测 run/result 设置上限，建议默认保留最近 50 条；实现可放在 storage/backtest 层，不要求新增配置文件或依赖。超过上限时按 created_at 或 started_at 淘汰最旧记录，并有测试覆盖。"
  required_constraints:
    - "第一阶段只做日线级回测，不实现分钟级 14:45、09:30-10:00 或 10:00 监督回放。"
    - "回测输出必须明确 limitations，说明日线级限制、成交假设限制、非真实成交、非收益承诺。"
    - "回测不得写入真实 ManualFill、ManualPosition 或人工成交账本；只能写入 backtest run/result。"
    - "fixture 数据只能用于 dev/test 或显式标记的演示回测；生产模式不得用 fixture 伪装真实历史数据。"
    - "不得新增依赖，不得修改 frontend/src/**、pyproject.toml、requirements*.txt、uv.lock、package.json 或 frontend/package.json。"
    - "不得接入券商 API、真实下单、自动交易、一键交易或禁用按钮文案。"

