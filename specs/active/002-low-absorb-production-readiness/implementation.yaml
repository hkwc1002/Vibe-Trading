implementation_steps:
  - step: "1. 在 data_sources/models.py 实现数据源质量模型"
    detail: "DataSourceAttempt, DataConflict, DataSourceHealth, MultiSourceFetchResult 等 Pydantic 模型"
  - step: "2. 在 data_sources/health.py 实现熔断和健康评分"
    detail: "电路状态（CLOSED/OPEN/HALF_OPEN）、健康评分、冷却逻辑"
  - step: "3. 在 data_sources/a_share_adapters.py 实现各源适配器"
    detail: "mootdx（K 线/盘口）、腾讯（实时/指数）、百度/新浪/同花顺（补充）、东方财富（限流）"
  - step: "4. 在 data_sources/a_share_orchestrator.py 实现 A 股多源编排"
    detail: "优先级管理、fallback 链、冲突检测、新鲜度检查、生产 fixture fallback 禁用"
  - step: "5. 在 data_sources/global_provider.py 实现全球行情 provider"
    detail: "迁移/重构 global_market_provider.py，统一数据质量返回"
  - step: "6. 更新 config.py 添加数据源配置"
    detail: "优先级、新鲜度阈值、冲突容忍阈值、生产 fallback 开关"
  - step: "7. 更新 data_provider / a_stock_provider / fallback_provider"
    detail: "适配新编排层，保留向后兼容；生产 fixture fallback 禁用"
  - step: "8. 实现数据源诊断 API"
    detail: "GET /low-absorb/data-sources/status, POST /low-absorb/data-sources/check, GET /low-absorb/data-sources/attempts"
  - step: "9. 更新 sentiment.py 消费数据质量"
    detail: "数据缺失/过期时返回'观察'或'拦截'，不得返回'允许'"
  - step: "10. 更新 scanner.py 数据异常阻断"
    detail: "fail-closed 时不生成新信号或交易计划"
  - step: "11. 编写测试：test_low_absorb_data_sources.py"
    detail: "单源、fallback、冲突、过期、全部失败、生产 fixture 禁用"
  - step: "12. 更新测试：sentiment/scanner/api_contract"
    detail: "情绪 fail-closed、scanner fail-closed、API 响应格式"
  - step: "13. 运行验证命令并记录结果"

