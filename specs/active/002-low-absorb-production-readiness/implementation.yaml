risk_assessment:
  risks:
    - "readiness 泄露敏感路径或配置状态"
    - "export_state 覆盖用户手动备份文件"
    - "load_state 从不可信来源恢复导致状态损坏"
  mitigations:
    - "readiness 只返回检查项名称、ok/failure、固定类别原因和脱敏摘要，不得返回完整路径、环境变量值、Webhook 或 Token"
    - "export_state 使用时间戳后缀 + 不覆盖已有文件策略"
    - "load_state 恢复前完成 Pydantic 全量结构校验；恢复前先对当前状态做备份；写入使用临时文件+原子替换策略"

questions_for_codex:
  - question: "deployment 包是否需要在 config_validator 中读取 .env 文件？还是所有配置从 LowAbsorbConfig + os.getenv 获取？"
    decision: "不直接解析 .env，从 LowAbsorbConfig、JsonLowAbsorbStorage 和 os.getenv 读取运行时已生效配置"
  - question: "backup export_state/load_state 放在 deployment/backup.py 还是 storage.py 上作为方法更合适？"
    decision: "storage.py 增加最小 export_state/load_state 方法；deployment/backup.py 负责组织备份文件名、目标目录、恢复流程和安全校验"
  - question: "readiness 端点是否需要 API_AUTH_KEY 认证保护？"
    decision: "health router 通过 register_low_absorb_routes(app, dependencies=...) 继承现有认证依赖；readiness 检查 API_AUTH_KEY 是否配置但只返回 configured/missing"

codex_confirmation:
  reviewed_by: "Codex"
  reviewed_at: "2026-06-16"
  decision: "CONFIRMED"
  summary: "Batch E 实现理解已通过 Codex 复审。上轮 CE-1/CE-2/CE-3 均已关闭：健康检查端点统一为 /low-absorb/health/readiness 与 /low-absorb/health/liveness；readiness 输出脱敏要求已补充；备份恢复的结构校验、当前状态备份、临时文件和原子替换策略已明确。Claude Code 可以按本 implementation.yaml 和 contract.yaml 开始实现。"
  resolved_changes:
    - id: "CE-1"
      status: "resolved"
      evidence: "in_scope 与 planned_changes 均已改为 GET /low-absorb/health/readiness 和 GET /low-absorb/health/liveness。"
    - id: "CE-2"
      status: "resolved"
      evidence: "implementation_steps 与 risk_assessment 已明确 readiness 只返回检查项名称、ok/failure、固定类别原因和脱敏摘要，不返回完整路径、环境变量值、Webhook 或 Token。"
    - id: "CE-3"
      status: "resolved"
      evidence: "storage.py 实现步骤已明确 load_state 恢复前全量结构校验、恢复前备份当前状态、临时文件+原子替换，失败不改变当前状态。"
  answers:
    - question: "deployment 包是否需要在 config_validator 中读取 .env 文件？还是所有配置从 LowAbsorbConfig + os.getenv 获取？"
      answer: "不要在实现中直接解析 .env 文件，也不要新增 dotenv 依赖。配置校验从 LowAbsorbConfig、JsonLowAbsorbStorage 和 os.getenv 读取运行时已生效配置；部署文档可以说明用户如何在 PowerShell 或启动脚本中设置环境变量。"
    - question: "backup export_state/load_state 放在 deployment/backup.py 还是 storage.py 上作为方法更合适？"
      answer: "允许在 storage.py 增加最小的 export_state/load_state 持久化能力，deployment/backup.py 负责组织备份文件名、目标目录、恢复流程和安全校验。保持业务状态读写的事实来源仍在 storage.py。"
    - question: "readiness 端点是否需要 API_AUTH_KEY 认证保护？"
      answer: "health router 必须通过 register_low_absorb_routes(app, dependencies=...) 注册并继承现有 Low Absorb 路由认证依赖，不得新增绕过认证的远程访问入口。生产 readiness 应检查 API_AUTH_KEY 是否已配置，但只返回 configured/missing，不返回值；本地 loopback 的既有开发绕过语义不在本批次改变。"

