implementation_steps:
  - step: "1. 先在 cost_chain/models.py 实现候选和审计模型"
    detail: "CostChainCandidateStatus 枚举、CostChainCandidate（含 version, source_type, confidence, components, diff_summary, status, timestamps）、CostChainAudit（action, actor, before/after version, timestamp, note）"
  - step: "2. 更新 models.py CostChainModel 增加 status 可选字段"
    detail: "默认 None 即视为 ACTIVE，保证向后兼容"
  - step: "3. 修改 storage.py：InMemoryLowAbsorbStorage 增加 candidates/audit_log"
    detail: "方法：create_candidate/list_candidates/get_candidate/update_candidate_status/rollback_to/get_audit_log；JsonLowAbsorbStorage 序列化/反序列化支持"
