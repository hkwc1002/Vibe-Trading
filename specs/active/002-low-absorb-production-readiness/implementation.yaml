implementation_steps:
  - step: "Step 1：models.py 增加 FeishuSendPolicy、FeishuNotificationAudit"
    detail: "FeishuSendPolicy：real_send_enabled（从 env/config 计算）、webhook_configured（bool）、masked_webhook（str|None）。FeishuNotificationAudit：notification_id、notification_type、target_id、idempotency_key、real_send、ok、error、sent_at。"
  - step: "Step 2：notifier.py 增加 get_send_policy() 和 real_send 逻辑"
    detail: "1) get_send_policy() 读取 LOW_ABSORB_FEISHU_REAL_SEND env var（默认 false）+ webhook 存在性 → 返回 FeishuSendPolicy。2) _send() 当 real_send_enabled=False 时不调用 transport，返回 mock 成功结果。3) 每类通知发送后写入 FeishuNotificationAudit。4) 提取 _mask_webhook() 到模块级工具函数。"
  - step: "Step 3：storage.py 增加 notification_audit 持久化"
    detail: "InMemoryLowAbsorbStorage 增加 notification_audits: list[FeishuNotificationAudit] = [] + add_notification_audit()/list_notification_audits() 方法。JsonLowAbsorbStorage 序列化/反序列化 notification_audits。"
  - step: "Step 4：api/settings.py 增加飞书通知状态路由"
    detail: "1) GET /low-absorb/settings/notifications/status — 返回 FeishuSendPolicy（masked webhook、real_send_enabled、webhook_configured）。2) POST /low-absorb/settings/notifications/test — 发送测试卡片（默认 mock；仅当 real_send_enabled 时真实发送）。3) GET /low-absorb/settings/notifications/audit — 查询通知审计记录。"
  - step: "Step 5：api/reports.py 增加通知 audit"
    detail: "POST /low-absorb/reports/close/notify 完成发送后写入 notification_audit；未开启 real_send 时 mock 并记录。"
  - step: "Step 6：更新 test_low_absorb_notifier.py"
    detail: "新增测试：real_send_enabled=false 时不调用 transport 且返回 ok=True；real_send_enabled=true 时正常调用 transport；FeishuSendPolicy 返回正确的掩码 webhook；notification_audit 记录包含所有必填字段。"
  - step: "Step 7：更新 test_low_absorb_reports.py"
    detail: "新增测试：报告通知产生 audit；缺少 webhook 时不真实发送。"
  - step: "Step 8：新建 test_low_absorb_feishu_integration.py"
    detail: "环境变量守卫测试：当 LOW_ABSORB_FEISHU_REAL_SEND=true 且 LOW_ABSORB_FEISHU_WEBHOOK 存在时，发送 test card 并验证返回 200；缺少任意环境变量时 pytest.skip。"
  - step: "Step 9：全量验证"
    detail: "运行 Batch D 验证命令 + Low Absorb 全量回归 + 前端测试/构建 + 金融安全扫描。"

