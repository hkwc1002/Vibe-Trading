    - "risk.py 增加回测 R 计算辅助"
    - "scanner 策略漏斗在回测上下文下的只读复用"
    - "trade_plan 交易计划生成在回测上下文下的只读复用"
    - "替换 test_low_absorb_backtest.py 骨架测试为真实回测测试"
    - "test_low_absorb_api_contract.py 增加回测 API 契约测试"
