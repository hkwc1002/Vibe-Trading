understanding:
  goal: "补齐飞书通知受控真实联调能力：支持推荐卡片、10:00风控提醒、成交回填提醒、收盘复盘报告和测试卡片的mock/受控真实发送。默认LOW_ABSORB_FEISHU_REAL_SEND=false；真实发送必须同时满足Webhook存在和真实发送开关开启；Webhook永不完整回显；全部通知类型具备幂等键和审计记录。"
  in_scope:
    - "修改 notifier.py：添加 FeishuSendPolicy 策略（env guard + webhook存在性检查），_send() 增加 real_send toggle 判断"
    - "修改 models.py：增加 FeishuSendPolicy、FeishuNotificationAudit 模型"
    - "修改 storage.py：增加 notification_audit 持久化和查询方法"
    - "修改 api/settings.py：增加飞书配置状态 API（配置/掩码/测试/审计）"
    - "修改 api/reports.py：复盘报告通知增加 audit 支持"
    - "修改 test_low_absorb_notifier.py：扩充 mock/real_send/webhook掩码/审计测试"
    - "修改 test_low_absorb_reports.py：增加通知审计关联测试"
    - "新建 test_low_absorb_feishu_integration.py：环境变量守卫的真实联调测试"
  out_of_scope:
    - "修改 frontend/src/**"
    - "新增 Python 依赖或修改项目配置"
    - "添加独立交易执行按钮或真实券商下单能力"
    - "页面中文化、品牌文案或 UI 视觉优化"
    - "在默认测试中真实发送飞书"
    - "打印完整 Webhook"

