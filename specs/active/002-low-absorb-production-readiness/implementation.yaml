understanding:
  goal: >
    建立英伟达 AI 服务器成本链半自动采集、候选版本、人工审核、生效、驳回、回滚和审计流程。
    保证未审核和低置信度的候选版本不影响信号排序。
  in_scope:
    - "新建 cost_chain/ 包：候选版本模型 CostChainCandidate，审计模型 CostChainAudit"
    - "新建 cost_chain/updater.py：半自动采集器，从默认数据生成候选版本（REVIEW_PENDING）"
    - "修改 models.py：CostChainModel 增加 status 可选项（默认为 ACTIVE）"
    - "修改 storage.py：支持候选版本 CRUD、审核状态变更、审计记录、回滚"
    - "修改 api/chain.py：增加 6 个端点（updates/create, updates/list, approve, reject, rollback, audit）"
    - "修改 chain_matrix.py：chain_priority_score 和 cost_signal_weight_for_sector 只消费 ACTIVE 状态版本"
    - "新增/更新测试文件：test_low_absorb_chain_matrix.py、test_low_absorb_chain_api.py、test_low_absorb_storage.py"
  out_of_scope:
    - "页面中文化、视觉优化、UI 重构"
    - "前端 frontend/src/** 修改"
    - "日线级真实回测（Batch C）"
    - "飞书真实联调（Batch D）"
    - "本机生产部署配置（Batch E）"
    - "新增 Python、Node 或系统依赖"
    - "真实券商下单、自动买卖、自动委托、一键交易"
    - "用 AI 生成成本权重或成本表"

