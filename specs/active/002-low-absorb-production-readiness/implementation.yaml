implementation_steps:
  - step: "Step 1：新建 deployment/ 包（config_validator + backup）"
    detail: "config_validator.py 实现 validate_production_readiness(storage) 返回 ReadinessResult（ready: bool, failures: list）。检查项：存储路径可读写、API_AUTH_KEY 存在（非本地）、data_production_mode 时 enable_fixture_fallback 必须 False、cost_chain 有 ACTIVE 版本、feishu webhook 状态。backup.py 实现 export_state/load_state。"
  - step: "Step 2：新建 api/health.py"
    detail: "readiness 端点遍历 config_validator 的所有检查项，返回 JSON {ready: bool, failures: [{name, ok, detail}]}。detail 只返回固定摘要字符串（如 'configured' / 'missing' / 'ok' / 'fixture_fallback_forbidden'），不暴露完整路径、环境变量值、Webhook 或 Token。liveness 返回 {status: 'alive'}。使用 LowAbsorbRepository protocol 便于测试 mock。"
  - step: "Step 3：修改 api/__init__.py"
    detail: "导入并注册 health_router。"
  - step: "Step 4：修改 storage.py"
    detail: "JsonLowAbsorbStorage.export_state(target_path) → 复制 state.json 到目标路径（含时间戳后缀，不覆盖已有文件）。load_state(source_path) → 加载前先对文件进行 Pydantic 结构校验（全量 re-validate），通过后创建当前状态备份（以防回滚），然后使用临时文件+原子替换策略写入 state.json；校验失败或写入失败不改变当前状态。"
  - step: "Step 5：修改 config.py"
    detail: "当前字段已完备；仅确认 readiness 消费路径。"
  - step: "Step 6：编写部署文档"
    detail: "docs/deployment/low_absorb_production.md：环境变量、启停、日志、备份恢复、回滚、健康检查。"
  - step: "Step 7：更新测试"
    detail: "三个测试文件的契约/路由/roundtrip 测试。"
  - step: "Step 8：全量验证"
    detail: "Batch E 验证 + 全量回归 + 前端 + 金融安全。"

