  in_scope:
    - "新建 agent/src/low_absorb/backtest/ 模块：engine、dataset、models、metrics"
    - "改造 api/backtest.py：从骨架返回升级为真实任务 API（runs CRUD）"
    - "models.py 增加回测共享模型（BacktestRunRequest/BacktestRun/BacktestResult）"
