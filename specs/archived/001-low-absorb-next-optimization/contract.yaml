    allow_files:
      - "agent/src/low_absorb/a_stock_provider.py"
      - "agent/src/low_absorb/data_provider.py"
      - "agent/src/low_absorb/fallback_provider.py"
      - "agent/src/low_absorb/config.py"
      - "agent/tests/test_low_absorb_data_sources.py"
      - "agent/tests/test_low_absorb_scanner.py"
    deny_files:
      - "frontend/**"
      - "agent/src/** 非 low_absorb 目录"
      - "项目依赖和配置文件"
    steps:
      - "补齐 A 股 provider 的数据源标识、市场日期、采集时间、新鲜度状态和失败原因。"
      - "确保数据缺失、字段缺失、接口异常或超过 max_data_staleness_seconds 时 fail-closed。"
      - "完善 fallback 触发条件，fallback 必须可解释。"
      - "补充正常、失败、过期和 scanner stale 拦截测试。"
    validation:
      - command: "C:\\Users\\hx\\AppData\\Local\\Programs\\Python\\Python312\\python.exe -m pytest agent/tests/test_low_absorb_data_sources.py agent/tests/test_low_absorb_scanner.py -q"
        expected: "相关测试通过。"
    acceptance:
      - "A 股数据源通过 MarketDataProvider 契约接入。"
      - "数据源异常有明确错误原因。"
      - "stale data 不生成信号或交易计划。"
  - id: "T2"
