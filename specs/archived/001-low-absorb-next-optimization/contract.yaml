  commands:
    - command: "git diff --check"
      required: true
      risk_if_skipped: "无法确认提交前无空白格式错误。"
    - command: "C:\\Users\\hx\\AppData\\Local\\Programs\\Python\\Python312\\python.exe -m pytest agent/tests -k low_absorb -q"
      required: true
      risk_if_skipped: "无法确认 Low Absorb 后端行为未回归。"
    - command: "cd frontend && npm.cmd run test:run"
      required: true
      risk_if_skipped: "无法确认 Low Absorb 前端页面和组件未回归。"
    - command: "cd frontend && npm.cmd run build"
      required: true
      risk_if_skipped: "无法确认 TypeScript 类型检查和生产构建可用。"
    - command: "rg -n \"(<button[^\\n>]*>\\s*(买入|卖出|下单|自动交易)\\s*</button>|aria-label=\\\"(买入|卖出|下单|自动交易)\\\"|>(买入|卖出|下单|自动交易)<)\" frontend/src/pages/low-absorb frontend/src/components/low-absorb"
      required: true
      risk_if_skipped: "无法确认 Low Absorb 页面没有禁用交易按钮文案。"
