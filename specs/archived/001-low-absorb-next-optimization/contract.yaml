financial_safety:
  applies: true
  forbidden_capabilities:
    - "真实券商下单"
    - "自动买卖"
    - "自动委托"
    - "券商交易执行 API"
    - "一键交易"
  forbidden_button_labels:
    - "买入"
    - "卖出"
    - "下单"
    - "自动交易"
  allowed_manual_labels:
    - "推送飞书"
    - "复制人工下单信息"
    - "记录人工成交"
    - "标记失效"
    - "生成风控提醒"
    - "记录卖出"
    - "生成复盘报告"

stop_conditions:
  - "需要修改 scope.allow 之外的文件。"
  - "需求与金融安全边界冲突。"
  - "需要新增依赖或修改项目配置。"
  - "接口契约缺失或与现有实现冲突。"
  - "外部数据源需要密钥、付费账号或无法在本地验证。"
  - "指定验证命令无法运行且无法判断风险。"
  - "发现真实交易执行、自动交易或券商执行 API 风险。"
  - "需要 Codex 修改源码或代替 Claude Code 实现。"

commit_policy:
  require_codex_review: true
  require_user_authorization: true
  only_stage_approved_files: true
  forbidden_git_commands:
    - "git add ."
    - "git add -A"
    - "git commit -am"
  required_pre_commit_check:
    - "review.yaml verdict 必须为 APPROVED_FOR_COMMIT。"
    - "git diff --cached --name-only 必须只包含 review.yaml 中 approved_for_commit.allowed_files。"
    - "提交、推送、创建 Draft PR 前必须有用户明确授权。"
