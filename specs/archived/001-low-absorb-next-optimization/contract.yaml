task_id: "001-low-absorb-next-optimization"
title: "Low Absorb 后续优化"
risk_level: "A"
created_by: "Codex"
created_at: "2026-06-14"

owners:
  specification: "Codex"
  implementation: "Claude Code CLI"
  review: "Codex"
  approval: "User"

workflow:
  required_inputs:
    - "brief.md"
    - "contract.yaml"
  markdown_docs:
    required_for_risk_levels:
      - "A"
    files:
      - "spec.md"
      - "plan.md"
      - "tasks.md"
  implementation_brief:
    file: "implementation.yaml"
    require_codex_confirmation_for:
      - "A"
    optional_for:
      - "C"
  delivery:
    file: "delivery.yaml"
    required: true
  review:
    file: "review.yaml"
    required_for_commit: true

goal: "在已完成的 AI 主板低吸基线之上，继续补齐 A 股和全球行情数据源、英伟达 AI 服务器成本链、交易建议解释、人工执行闭环、市场情绪、回测、复盘和持久化能力。"

scope:
  allow:
    - path: "specs/active/001-low-absorb-next-optimization/implementation.yaml"
      reason: "Claude Code 实现前理解文件"
    - path: "specs/active/001-low-absorb-next-optimization/delivery.yaml"
      reason: "Claude Code 交付证据文件"
    - path: "agent/src/low_absorb/**"
      reason: "Low Absorb 后端模块"
    - path: "agent/tests/test_low_absorb_*.py"
      reason: "Low Absorb 后端测试"
    - path: "frontend/src/pages/low-absorb/**"
      reason: "Low Absorb 前端页面"
    - path: "frontend/src/components/low-absorb/**"
      reason: "Low Absorb 专用前端组件"
    - path: "frontend/src/types/lowAbsorb.ts"
      reason: "Low Absorb 前端类型"
    - path: "frontend/src/mocks/lowAbsorb.ts"
      reason: "仅允许作为 API 失败 fallback 或 demo 数据"
  deny:
    - path: "specs/constitution.md"
      reason: "项目宪法不得修改"
    - path: "AGENTS.md"
      reason: "项目角色与流程规则不得由 Claude Code 修改"
    - path: "package.json"
      reason: "不得新增依赖或改脚本，除非停止并获得确认"
    - path: "pyproject.toml"
      reason: "不得新增依赖或改项目配置，除非停止并获得确认"
    - path: "tsconfig*.json"
      reason: "不得修改类型配置规避错误"
    - path: ".github/**"
      reason: "本任务不修改 CI 或 PR 流程"
    - path: "agent/src/**"
      reason: "除 agent/src/low_absorb/** 外，不得影响其他后端模块"
    - path: "frontend/src/**"
      reason: "除 Low Absorb 页面、组件、类型和 mock 外，不得影响其他前端模块"
    - path: ".codex/**"
      reason: "本地工具目录不得纳入交付"
    - path: ".playwright-mcp/**"
      reason: "浏览器验证产物不得纳入交付"
    - path: "co.sh"
      reason: "本地脚本不得纳入交付"
    - path: "AGENT.md"
      reason: "旧版规则文件不得纳入交付"

non_goals:
  - "不实现真实券商下单。"
  - "不接入券商交易执行 API。"
  - "不实现自动买卖、自动委托、一键交易或自动交易。"
  - "不由前端直接调用外部行情源。"
  - "不在前端硬编码真实英伟达 AI 服务器成本权重。"
  - "不新增依赖或修改项目配置，除非先停止并获得 Codex 与用户确认。"
  - "不由 Codex 代替 Claude Code CLI 修改源码。"

baseline:
  completed:
    - "首页和 Low Absorb 页面中文化已完成。"
    - "Low Absorb 禁用动作文案巡检已完成。"
    - "数据源契约基础扩展已完成。"
    - "A 股 provider、全球/美股 provider、fallback provider 已有初始拆分。"
    - "成本链模型基础字段和三类版本已有基线。"
    - "设置页基础字段已有基线。"
    - "上一轮 Codex 提交前审查结论为 APPROVED_FOR_COMMIT。"

requirements:
  - id: "R1"
    text: "Claude Code 必须先产出 implementation.yaml，并在 A 类任务中等待 Codex 确认后再实现。"
    priority: "MUST"
    acceptance:
      - "implementation.yaml 使用 specs/templates/implementation.yaml 结构。"
      - "implementation.yaml 列出本轮任务编号、修改文件、测试计划、风险和停止条件。"
    evidence_required:
      - "implementation.yaml"
      - "Codex 确认记录"
  - id: "R2"
    text: "A 股数据源必须通过 Python 后端 provider 接入，数据缺失、异常或过期时 fail-closed。"
    priority: "MUST"
    acceptance:
      - "A 股 provider 返回数据源标识、市场日期、采集时间、新鲜度状态和失败原因。"
      - "stale data 不生成信号或交易计划。"
    evidence_required:
      - "agent/tests/test_low_absorb_data_sources.py"
      - "agent/tests/test_low_absorb_scanner.py"
  - id: "R3"
    text: "全球行情和美股行情必须由后端数据源封装，并能服务市场情绪交易许可。"
    priority: "MUST"
    acceptance:
      - "全球风险偏好异常时情绪结论为观察或拦截。"
      - "不使用 AI 生成行情数据。"
    evidence_required:
      - "agent/tests/test_low_absorb_data_sources.py"
      - "agent/tests/test_low_absorb_sentiment.py"
  - id: "R4"
    text: "英伟达 AI 服务器成本链必须包含来源、来源类型、置信度、as_of 和估算说明，并支持 custom/manual 保存。"
    priority: "MUST"
    acceptance:
      - "GB200 NVL72 和 GB300 NVL72 只读。"
      - "custom/manual 可保存并持久化。"
      - "低置信度数据可展示但不单独决定交易建议。"
    evidence_required:
      - "agent/tests/test_low_absorb_chain_matrix.py"
      - "agent/tests/test_low_absorb_chain_api.py"
  - id: "R5"
    text: "AI 产业链页面必须展示成本链、板块指标、股票角色、来源和置信度。"
    priority: "MUST"
    acceptance:
      - "8 个内部标签可切换。"
      - "成本链来源、置信度、as_of 可展示。"
      - "前端不硬编码真实成本权重。"
    evidence_required:
      - "frontend/src/pages/low-absorb/__tests__/DecisionDashboardUi.test.tsx"
  - id: "R6"
    text: "信号排序和交易计划必须消费 AI 分支强度与成本链 signal weight，并生成可读解释。"
    priority: "MUST"
    acceptance:
      - "技术条件相近时强分支排序更高。"
      - "弱分支存在降级或拦截原因。"
      - "交易计划包含 AI 产业链解释。"
    evidence_required:
      - "agent/tests/test_low_absorb_scanner.py"
      - "agent/tests/test_low_absorb_trade_plan.py"
  - id: "R7"
    text: "Workbench 必须补齐详情抽屉和底部统一人工动作栏。"
    priority: "MUST"
    acceptance:
      - "详情抽屉展示信号、计划、飞书预览、人工成交和风险解释。"
      - "底部动作栏随信号、计划、持仓上下文变化。"
      - "无禁用交易按钮文案。"
    evidence_required:
      - "frontend/src/pages/low-absorb/__tests__/WorkbenchUi.test.tsx"
  - id: "R8"
    text: "市场情绪必须形成交易许可系统，展示全球情绪、A 股情绪、六个闸门和允许/观察/拦截结论。"
    priority: "MUST"
    acceptance:
      - "后端返回交易许可快照。"
      - "前端用仪表化页面展示结论和事件流。"
    evidence_required:
      - "agent/tests/test_low_absorb_sentiment.py"
      - "frontend/src/pages/low-absorb/__tests__/Stage9Pages.test.tsx"
  - id: "R9"
    text: "策略回测必须展示总览、参数、历史信号、敏感性、分支归因和改进建议。"
    priority: "SHOULD"
    acceptance:
      - "回测页面不只是静态占位。"
      - "回测结果不构成收益承诺。"
    evidence_required:
      - "agent/tests/test_low_absorb_backtest.py"
      - "frontend/src/pages/low-absorb/__tests__/Stage9Pages.test.tsx"
  - id: "R10"
    text: "收盘复盘报告必须可生成、保存、读取、展示并可推送飞书报告卡片。"
    priority: "SHOULD"
    acceptance:
      - "报告区分系统建议和人工执行结果。"
      - "前端可查看当日摘要和历史归档。"
    evidence_required:
      - "agent/tests/test_low_absorb_reports.py"
      - "frontend/src/pages/low-absorb/__tests__/LowAbsorbPages.test.tsx"
  - id: "R11"
    text: "Low Absorb 仓储必须支持关键业务对象持久化 roundtrip。"
    priority: "MUST"
    acceptance:
      - "信号、计划、成交、持仓、风险、报告、通知、设置和成本链 reload 后可读取。"
      - "敏感信息不明文回显。"
    evidence_required:
      - "agent/tests/test_low_absorb_storage.py"
  - id: "R12"
    text: "交付前必须完成自我审查、重新验证并产出 delivery.yaml。"
    priority: "MUST"
    acceptance:
      - "delivery.yaml 使用最新版模板。"
      - "后端 Low Absorb 测试、前端测试、前端构建和必要页面验证有证据。"
      - "金融安全边界检查有证据。"
    evidence_required:
      - "delivery.yaml"

tasks:
  - id: "T0"
    title: "实现前确认门禁"
    depends_on: []
    allow_files:
      - "specs/active/001-low-absorb-next-optimization/implementation.yaml"
    deny_files:
      - "所有源码文件"
      - "specs/active/001-low-absorb-next-optimization/spec.md"
      - "specs/active/001-low-absorb-next-optimization/plan.md"
    steps:
      - "阅读 brief.md、contract.yaml、spec.md、plan.md、tasks.md。"
      - "按 specs/templates/implementation.yaml 生成 implementation.yaml。"
      - "列出本轮任务编号、预计修改文件、测试计划、风险点和停止条件。"
      - "A 类任务等待 Codex 确认后再实现。"
    validation:
      - command: "Test-Path specs\\active\\001-low-absorb-next-optimization\\implementation.yaml"
        expected: "返回 True。"
    acceptance:
      - "implementation.yaml 存在且结构符合模板。"
      - "Codex 确认前不得修改源码。"
  - id: "T1"
    title: "A 股数据源适配闭环"
    depends_on:
